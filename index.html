<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PS40 Class Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAFAF7; --card: #FFFFFF; --border: #E2E0D8; --text: #2C2C2C;
    --text-muted: #7A7A72; --accent: #1D4ED8; --accent-light: #DBEAFE;
    --dem: #2563EB; --rep: #DC2626; --green: #16A34A; --warm: #F5F0E8;
    --font: "Newsreader","Georgia",serif;
    --sans: "DM Sans","Helvetica Neue",sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  .nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; border-bottom: 1px solid var(--border); background: #fff; flex-wrap: wrap; gap: 8px; }
  .nav-title { font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; }
  .nav-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .content { padding: 40px 20px; max-width: 720px; margin: 0 auto; }
  .btn { font-family: var(--sans); font-size: 15px; font-weight: 600; padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; letter-spacing: 0.01em; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--warm); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: #FEE2E2; color: #991B1B; }
  .btn-sm { padding: 8px 16px; font-size: 13px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 24px; }
  .field-label { font-family: var(--sans); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px; }
  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-opt { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; border: 1.5px solid var(--border); background: #fff; cursor: pointer; font-family: var(--sans); font-size: 14px; transition: all 0.15s; }
  .radio-opt.selected { border-color: var(--accent); background: var(--accent-light); }
  .radio-opt input { accent-color: var(--accent); width: 16px; height: 16px; }
  .thermo-btn { width: 44px; height: 44px; border-radius: 8px; border: 2px solid var(--border); background: #fff; color: var(--text); font-family: var(--sans); font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .thermo-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 700; }
  .progress-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
  .dot.active { background: var(--accent); }
  .dot.done { background: var(--accent); opacity: 0.4; }
  .profile-card { border-left: 4px solid var(--accent); background: linear-gradient(135deg, #fff 0%, var(--warm) 100%); }
  .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .profile-grid .full { grid-column: 1 / -1; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .bar-label { width: 160px; font-family: var(--sans); font-size: 13px; text-align: right; color: var(--text-muted); flex-shrink: 0; }
  .bar-track { flex: 1; background: var(--warm); border-radius: 4px; height: 28px; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; min-width: 2px; }
  .bar-val { width: 70px; font-family: var(--sans); font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #fff; padding: 8px 16px; border-radius: 8px; font-family: var(--sans); font-size: 13px; z-index: 100; }
  h1 { font-family: var(--font); font-size: 28px; font-weight: 700; }
  h2 { font-family: var(--font); font-size: 22px; font-weight: 700; }
  h3 { font-family: var(--font); font-size: 18px; font-weight: 600; margin-bottom: 16px; }
  .hidden { display: none !important; }
  @media (max-width: 600px) { .bar-label { width: 100px; font-size: 11px; } .nav { padding: 10px 12px; } }
</style>
</head>
<body>

<div class="nav">
  <div class="nav-title">PS40 · ORR &amp; HUBER REPLICATION</div>
  <div class="nav-btns" id="nav-btns"></div>
</div>
<div class="content" id="content"></div>
<div class="toast hidden" id="toast">Saving...</div>

<script>
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbz8RBrLGSRbC3BDQLqWWXkw2rA07d9VgpJom_Z9LuN405DXzeRZk4bptbJ3vzPCJnsNYQ/exec";
const NUM_PROFILES = 3;
const POLICY_ISSUES = [
  { key:"immigration", label:"Immigration", positions:[
    "Supports increasing legal immigration and a path to citizenship for undocumented immigrants",
    "Supports reducing legal immigration and stricter enforcement against undocumented immigrants"]},
  { key:"iran", label:"Iran Policy", positions:[
    "Supports diplomacy and rejoining the Iran nuclear deal",
    "Supports maintaining maximum pressure sanctions and a tough military posture toward Iran"]}
];
const PARTIES = ["Democrat","Republican"];
const STATES = ["Texas","Ohio","Virginia","Colorado","Georgia","Pennsylvania","Michigan","Arizona","Wisconsin","Nevada"];
const JOBS = ["High school teacher","Small business owner","Nurse","Software engineer","Construction worker","Accountant","Restaurant manager","Police officer","Social worker","Electrician"];
const NAMES = ["Alex Johnson","Jordan Smith","Taylor Williams","Morgan Davis","Casey Brown","Riley Wilson","Jamie Anderson","Quinn Thomas","Drew Martinez","Avery Garcia","Reese Thompson","Skyler Robinson"];

function pick(a){return a[Math.floor(Math.random()*a.length)]}
function pickEx(a,ex){const f=a.filter(x=>!ex.includes(x));return pick(f.length?f:a)}
function genId(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36)}

let state = { stage:"intro", respondent:null, profiles:[], profileIdx:0, ratings:[], responses:[], loading:false };
const $=id=>document.getElementById(id);
const content=$("content"), navBtns=$("nav-btns"), toast=$("toast");

function showToast(msg,ms=2000){toast.textContent=msg;toast.classList.remove("hidden");setTimeout(()=>toast.classList.add("hidden"),ms)}

function genProfiles(resp){
  const used=[];
  return Array.from({length:NUM_PROFILES},(_,i)=>{
    const tr=Math.random()<0.5?0:1, pp=pick(PARTIES), co=pp===resp.party;
    const nm=pickEx(NAMES,used); used.push(nm);
    const p={name:nm,state:pick(STATES),job:pick(JOBS),party:pp,treatment:tr,copartisan:co,
      policy:null,policyArea:null,policyCongruent:null,policyIssueKey:null,profileIndex:i};
    if(tr===1){const iss=pick(POLICY_ISSUES);const pi=Math.random()<0.5?0:1;
      p.policy=iss.positions[pi];p.policyArea=iss.label;p.policyIssueKey=iss.key;
      p.policyCongruent=pi===resp[iss.key];}
    return p;
  });
}

function renderNav(){
  navBtns.innerHTML="";
  if(state.stage!=="results"){
    navBtns.innerHTML=`<button class="btn btn-secondary btn-sm" onclick="goResults()">📊 Results</button>`;
  } else {
    navBtns.innerHTML=`
      <button class="btn btn-secondary btn-sm" onclick="goSurvey()">← Survey</button>
      <button class="btn btn-secondary btn-sm" onclick="goResults()">🔄 Refresh</button>
      <button class="btn btn-secondary btn-sm" onclick="downloadCSV()">⬇ CSV</button>
    `;
  }
}

function goSurvey(){state.stage="intro";render()}
function goResults(){state.stage="results";render();loadResults()}

// ─── Stages ─────────────────────────────────────────────────────────
function render(){
  renderNav();
  if(state.stage==="intro") renderIntro();
  else if(state.stage==="background") renderBackground();
  else if(state.stage==="profile") renderProfile();
  else if(state.stage==="thanks") renderThanks();
  else if(state.stage==="results") renderResults();
}

function renderIntro(){
  content.innerHTML=`
    <div style="text-align:center;max-width:520px;margin:0 auto">
      <div style="font-size:40px;margin-bottom:8px">🗳️</div>
      <h1 style="margin-bottom:8px">PS40 Class Survey</h1>
      <p style="font-family:var(--sans);font-size:15px;color:var(--text-muted);line-height:1.6;margin-bottom:32px">
        This is a short survey about how we form impressions of other people. You'll answer a few questions about yourself, then evaluate three profiles. It takes about 3 minutes. Your responses are anonymous.</p>
      <button class="btn btn-primary" onclick="state.stage='background';render()">Begin Survey →</button>
    </div>`;
}

function renderBackground(){
  content.innerHTML=`
    <div style="max-width:560px;margin:0 auto">
      <h2 style="margin-bottom:24px">About You</h2>
      <div style="margin-bottom:24px">
        <div class="field-label">Which party do you lean toward or identify with more?</div>
        <div class="radio-group" id="rg-party">${PARTIES.map(p=>`
          <label class="radio-opt" data-val="${p}"><input type="radio" name="party" value="${p}" onchange="bgSelect('party','${p}')">${p}</label>`).join("")}
        </div>
      </div>
      <div style="margin-bottom:24px">
        <div class="field-label">Which is closer to your view on immigration?</div>
        <div class="radio-group" id="rg-imm">${POLICY_ISSUES[0].positions.map((p,i)=>`
          <label class="radio-opt" data-val="${i}"><input type="radio" name="imm" value="${i}" onchange="bgSelect('immigration','${i}')">${p}</label>`).join("")}
        </div>
      </div>
      <div style="margin-bottom:28px">
        <div class="field-label">Which is closer to your view on Iran policy?</div>
        <div class="radio-group" id="rg-iran">${POLICY_ISSUES[1].positions.map((p,i)=>`
          <label class="radio-opt" data-val="${i}"><input type="radio" name="iran" value="${i}" onchange="bgSelect('iran','${i}')">${p}</label>`).join("")}
        </div>
      </div>
      <button class="btn btn-primary" id="bg-next" disabled onclick="submitBackground()">Next →</button>
    </div>`;
}

let bgData={party:null,immigration:null,iran:null};
function bgSelect(field,val){
  bgData[field]=field==="party"?val:Number(val);
  document.querySelectorAll(`#rg-${field==="party"?"party":field==="immigration"?"imm":"iran"} .radio-opt`).forEach(el=>{
    el.classList.toggle("selected",el.dataset.val===String(val));
  });
  $("bg-next").disabled=!(bgData.party!==null&&bgData.immigration!==null&&bgData.iran!==null);
}
function submitBackground(){
  state.respondent=bgData;
  state.profiles=genProfiles(bgData);
  state.profileIdx=0;state.ratings=[];
  state.stage="profile";render();
}

function renderProfile(){
  const idx=state.profileIdx, prof=state.profiles[idx];
  const pc=prof.party==="Democrat"?"var(--dem)":"var(--rep)";
  content.innerHTML=`
    <div style="max-width:560px;margin:0 auto">
      <div class="progress-dots">${Array.from({length:NUM_PROFILES},(_,i)=>
        `<div class="dot ${i<idx?"done":i===idx?"active":""}"></div>`).join("")}</div>
      <h2 style="margin-bottom:4px">Profile ${idx+1} of ${NUM_PROFILES}</h2>
      <p style="font-family:var(--sans);font-size:14px;color:var(--text-muted);margin-bottom:20px">Read this person's profile, then rate how warmly you feel toward them.</p>
      <div class="card profile-card" style="border-left-color:${pc}">
        <div style="font-family:var(--font);font-size:22px;font-weight:700;margin-bottom:4px">${prof.name}</div>
        <div style="font-family:var(--sans);font-size:14px;color:var(--text-muted);margin-bottom:16px">Person you might meet at a community event</div>
        <div class="profile-grid">
          <div><div class="field-label">State</div><div style="font-family:var(--sans);font-size:15px">${prof.state}</div></div>
          <div><div class="field-label">Occupation</div><div style="font-family:var(--sans);font-size:15px">${prof.job}</div></div>
          <div><div class="field-label">Party</div><div style="font-family:var(--sans);font-size:15px;color:${pc};font-weight:600">${prof.party}</div></div>
          ${prof.policy?`<div class="full"><div class="field-label">${prof.policyArea}</div><div style="font-family:var(--sans);font-size:14px;line-height:1.5;font-style:italic">"${prof.policy}"</div></div>`:""}
        </div>
      </div>
      <div style="margin-top:28px">
        <div class="field-label">How warmly do you feel toward this person? (0 = very cold, 10 = very warm)</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px" id="thermo">
          ${Array.from({length:11},(_,i)=>`<button class="thermo-btn" onclick="selectRating(${i})">${i}</button>`).join("")}
        </div>
        <div style="display:flex;justify-content:space-between;font-family:var(--sans);font-size:12px;color:var(--text-muted);margin-top:6px;max-width:${44*11+6*10}px">
          <span>Very cold</span><span>Very warm</span>
        </div>
      </div>
      <div style="margin-top:28px">
        <button class="btn btn-primary" id="profile-next" disabled onclick="submitProfile()">${idx<NUM_PROFILES-1?"Next Profile →":"Submit All →"}</button>
      </div>
    </div>`;
}

let currentRating=null;
function selectRating(r){
  currentRating=r;
  document.querySelectorAll(".thermo-btn").forEach((b,i)=>b.classList.toggle("selected",i===r));
  $("profile-next").disabled=false;
}
function submitProfile(){
  const prof=state.profiles[state.profileIdx];
  state.ratings.push({
    respondentId: state.ratings.length===0 ? genId() : state.ratings[0].respondentId,
    respondentParty: state.respondent.party,
    profileIndex: state.profileIdx,
    profileParty: prof.party,
    copartisan: prof.copartisan,
    treatment: prof.treatment,
    policyIssue: prof.policyIssueKey||"",
    policyCongruent: prof.policyCongruent,
    rating: currentRating,
    ts: Date.now()
  });
  // Fix: set consistent respondentId
  const rid=state.ratings[0].respondentId;
  state.ratings.forEach(r=>r.respondentId=rid);

  currentRating=null;
  if(state.profileIdx<NUM_PROFILES-1){
    state.profileIdx++;render();
  } else {
    saveToSheet(state.ratings);
    state.stage="thanks";render();
  }
}

async function saveToSheet(ratings){
  showToast("Saving...",5000);
  // Always save locally as backup
  saveLocal(ratings);
  try{
    await fetch(WEBHOOK_URL,{
      method:"POST", mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({responses:ratings})
    });
    showToast("Saved!",1500);
  }catch(e){console.error(e);showToast("Save may have failed — your data was sent",3000)}
}

function renderThanks(){
  content.innerHTML=`
    <div style="text-align:center;max-width:480px;margin:0 auto">
      <div style="font-size:48px;margin-bottom:12px">✓</div>
      <h2 style="color:var(--green);margin-bottom:12px">Thank you!</h2>
      <p style="font-family:var(--sans);font-size:15px;color:var(--text-muted);line-height:1.6">
        Your ${NUM_PROFILES} responses have been recorded. We'll look at the class results together shortly.</p>
    </div>`;
}

// ─── Results ────────────────────────────────────────────────────────
function parseRow(row){
  return {
    ...row,
    copartisan: row.copartisan===true||row.copartisan==="true"||row.copartisan==="TRUE",
    policyCongruent: row.policyCongruent===true||row.policyCongruent==="true"||row.policyCongruent==="TRUE",
    treatment: Number(row.treatment),
    rating: Number(row.rating),
    profileIndex: Number(row.profileIndex),
  };
}

// Save to localStorage as backup
function saveLocal(ratings){
  try{
    const existing=JSON.parse(localStorage.getItem("ps40_responses")||"[]");
    const updated=[...existing,...ratings];
    localStorage.setItem("ps40_responses",JSON.stringify(updated));
  }catch(e){}
}
function getLocal(){
  try{return JSON.parse(localStorage.getItem("ps40_responses")||"[]")}catch(e){return[]}
}

async function loadResults(){
  content.innerHTML=`<div style="text-align:center;padding:40px"><p style="font-family:var(--sans);color:var(--text-muted)">Loading results...</p></div>`;
  
  // Try fetching from Google Sheets
  let sheetData=[];
  let sheetOk=false;
  try{
    const r=await fetch(WEBHOOK_URL,{redirect:"follow"});
    const d=await r.json();
    if(d.status==="ok"&&d.responses){
      sheetData=d.responses.map(parseRow);
      sheetOk=true;
    }
  }catch(e){console.warn("Sheet fetch failed, using local data:",e)}
  
  if(sheetOk){
    state.responses=sheetData;
  } else {
    // Fallback to localStorage
    const local=getLocal();
    if(local.length){
      state.responses=local;
      showToast("Showing locally cached results",2500);
    } else {
      content.innerHTML=`<div style="text-align:center;padding:40px">
        <p style="font-family:var(--sans);color:var(--text-muted);margin-bottom:12px">Could not load results from Google Sheets.</p>
        <p style="font-family:var(--sans);font-size:13px;color:var(--text-muted)">Results are still being saved to your Google Sheet — open it directly to see the data, or try refreshing.</p>
      </div>`;
      return;
    }
  }
  renderResultsDashboard();
}

function renderResultsDashboard(){
  const R=state.responses;
  if(!R.length){content.innerHTML=`<div style="text-align:center;padding:40px"><p style="font-family:var(--sans);color:var(--text-muted)">No responses yet.</p></div>`;return}

  const mean=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
  const nResp=new Set(R.map(r=>r.respondentId)).size;
  const ctrl=R.filter(r=>r.treatment===0), pol=R.filter(r=>r.treatment===1);
  const ctrlCo=ctrl.filter(r=>r.copartisan), ctrlOut=ctrl.filter(r=>!r.copartisan);
  const cc=pol.filter(r=>r.copartisan&&r.policyCongruent);
  const ci=pol.filter(r=>r.copartisan&&!r.policyCongruent);
  const oc=pol.filter(r=>!r.copartisan&&r.policyCongruent);
  const oi=pol.filter(r=>!r.copartisan&&!r.policyCongruent);
  const polCo=pol.filter(r=>r.copartisan), polOut=pol.filter(r=>!r.copartisan);
  const polCong=pol.filter(r=>r.policyCongruent), polInc=pol.filter(r=>!r.policyCongruent);

  const m=a=>a.length?mean(a.map(r=>r.rating)).toFixed(2):"—";
  const d=(a,b)=>a.length&&b.length?(mean(a.map(r=>r.rating))-mean(b.map(r=>r.rating))).toFixed(2):"—";
  const bar=(label,val,max,color)=>`<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${max>0?(val/max)*100:0}%;background:${color}"></div></div>
    <div class="bar-val" style="color:${color}">${val.toFixed(2)}</div></div>`;
  const barN=(label,val,n,max,color)=>`<div class="bar-row">
    <div class="bar-label">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${max>0?(val/max)*100:0}%;background:${color}"></div></div>
    <div class="bar-val">${val.toFixed(2)} <span style="font-weight:400;color:var(--text-muted);font-size:11px">(n=${n})</span></div></div>`;

  // Affective polarization
  const ctrlGap=ctrlCo.length&&ctrlOut.length?mean(ctrlCo.map(r=>r.rating))-mean(ctrlOut.map(r=>r.rating)):null;
  const polGap=polCo.length&&polOut.length?mean(polCo.map(r=>r.rating))-mean(polOut.map(r=>r.rating)):null;
  const maxGap=Math.max(Math.abs(ctrlGap||0),Math.abs(polGap||0),1);

  const gapBar=(label,gap,color,maxG)=>{
    if(gap===null) return `<div class="bar-row"><div class="bar-label">${label}</div><div class="bar-track"></div><div class="bar-val">—</div></div>`;
    const pct=(Math.abs(gap)/maxG)*50;
    const left=gap>=0?50:50-pct;
    return `<div class="bar-row">
      <div class="bar-label">${label}</div>
      <div class="bar-track">
        <div style="position:absolute;top:3px;bottom:3px;left:${left}%;width:${pct}%;background:${color};border-radius:4px;transition:all 0.5s"></div>
        <div style="position:absolute;top:0;bottom:0;left:50%;width:1px;background:var(--border);z-index:1"></div>
      </div>
      <div class="bar-val" style="color:${color}">${gap>=0?"+":""}${gap.toFixed(2)}</div></div>`;
  };

  let polNote="";
  if(ctrlGap!==null&&polGap!==null){
    polNote=Math.abs(polGap)<Math.abs(ctrlGap)
      ?`Affective polarization <strong>decreases by ${(Math.abs(ctrlGap)-Math.abs(polGap)).toFixed(2)} points</strong> when policy information is provided — consistent with Orr &amp; Huber's finding that policy views cut across partisan lines.`
      :`Affective polarization is <strong>similar or larger</strong> when policy info is present (${Math.abs(polGap).toFixed(2)}) vs absent (${Math.abs(ctrlGap).toFixed(2)}).`;
  }

  content.innerHTML=`
    <div style="max-width:740px;margin:0 auto">
      <h2 style="margin-bottom:4px">Live Results</h2>
      <p style="font-family:var(--sans);font-size:14px;color:var(--text-muted);margin-bottom:28px">${nResp} respondents · ${R.length} profile evaluations</p>

      <div class="card">
        <h3>Mean Warmth by Treatment Arm</h3>
        ${barN("Control (party only)",ctrl.length?mean(ctrl.map(r=>r.rating)):0,ctrl.length,10,"var(--accent)")}
        ${barN("Policy treatment",pol.length?mean(pol.map(r=>r.rating)):0,pol.length,10,"var(--accent)")}
      </div>

      <div class="card">
        <h3>Affective Polarization: Policy Absent vs Present</h3>
        <p style="font-family:var(--sans);font-size:13px;color:var(--text-muted);margin-bottom:20px">Gap in warmth between co-partisan and out-partisan profiles</p>
        ${gapBar("No policy info (control)",ctrlGap,"#8B5CF6",maxGap)}
        ${gapBar("Policy info present",polGap,"#F59E0B",maxGap)}
        <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
          <div style="width:160px"></div>
          <div style="flex:1;display:flex;justify-content:space-between;font-family:var(--sans);font-size:11px;color:var(--text-muted)">
            <span>← Favors out-partisan</span><span>No gap</span><span>Favors co-partisan →</span>
          </div>
          <div style="width:70px"></div>
        </div>
        ${polNote?`<div style="margin-top:16px;padding:12px 16px;background:var(--warm);border-radius:8px;font-family:var(--sans);font-size:13px;color:var(--text)">${polNote}</div>`:""}
      </div>

      <div class="card">
        <h3>Control: Co-partisan vs Out-partisan</h3>
        ${barN("Co-partisan",ctrlCo.length?mean(ctrlCo.map(r=>r.rating)):0,ctrlCo.length,10,"var(--dem)")}
        ${barN("Out-partisan",ctrlOut.length?mean(ctrlOut.map(r=>r.rating)):0,ctrlOut.length,10,"var(--rep)")}
      </div>

      <div class="card">
        <h3>Policy Treatment: Party × Policy Congruence</h3>
        ${barN("Co-partisan + Congruent",cc.length?mean(cc.map(r=>r.rating)):0,cc.length,10,"var(--dem)")}
        ${barN("Co-partisan + Incongruent",ci.length?mean(ci.map(r=>r.rating)):0,ci.length,10,"var(--dem)")}
        ${barN("Out-partisan + Congruent",oc.length?mean(oc.map(r=>r.rating)):0,oc.length,10,"var(--rep)")}
        ${barN("Out-partisan + Incongruent",oi.length?mean(oi.map(r=>r.rating)):0,oi.length,10,"var(--rep)")}
        <p style="font-family:var(--sans);font-size:12px;color:var(--text-muted);margin-top:12px">Blue = co-partisan profile · Red = out-partisan profile</p>
      </div>

      <div class="card">
        <h3>Key Comparisons</h3>
        <div style="font-family:var(--sans);font-size:14px;line-height:2">
          <div><strong>Partisan affect (control):</strong> Co-partisan ${m(ctrlCo)} vs Out-partisan ${m(ctrlOut)}, Δ = ${d(ctrlCo,ctrlOut)}</div>
          <div><strong>Policy congruence (policy arm):</strong> Congruent ${m(polCong)} vs Incongruent ${m(polInc)}, Δ = ${d(polCong,polInc)}</div>
          <div><strong>Partisanship (policy arm):</strong> Co-partisan ${m(polCo)} vs Out-partisan ${m(polOut)}, Δ = ${d(polCo,polOut)}</div>
          <hr style="border:none;border-top:1px solid var(--border);margin:8px 0">
          <div style="color:var(--text-muted);font-size:13px"><strong>Orr &amp; Huber prediction:</strong> Policy congruence Δ should be larger than partisanship Δ within the policy treatment arm — people respond more to shared policy views than shared party labels.</div>
        </div>
      </div>
    </div>`;
}

function downloadCSV(){
  const R=state.responses;
  if(!R.length){showToast("No data to download");return}
  const cols=["respondentId","respondentParty","profileIndex","profileParty","copartisan","treatment","policyIssue","policyCongruent","rating","ts"];
  const csv=[cols.join(","),...R.map(r=>cols.map(c=>{const v=r[c];return v===null||v===undefined?"":v}).join(","))].join("\n");
  const blob=new Blob([csv],{type:"text/csv"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="ps40_orr_huber_data.csv";a.click();
  URL.revokeObjectURL(url);
}

// Init
render();
</script>
</body>
</html>
